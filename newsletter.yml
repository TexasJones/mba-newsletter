name: Generate MBA Newsletter

on:
  # Run every Monday at 8:00 AM Central (14:00 UTC)
  schedule:
    - cron: "0 14 * * 1"

  # Run manually anytime from the Actions tab
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate newsletter
        run: python generate_newsletter.py

      - name: Commit and push newsletter
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsletters/
          git diff --cached --quiet || git commit -m "📰 Weekly MBA newsletter $(date +'%Y-%m-%d')"
          git push

      - name: Send email notification
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python - <<'EOF'
          import smtplib
          import os
          from datetime import datetime
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          gmail  = os.environ["GMAIL_ADDRESS"]
          app_pw = os.environ["GMAIL_APP_PASSWORD"]
          today  = datetime.now().strftime("%B %d, %Y")
          url    = "https://texasjones.github.io/mba-newsletter/newsletters/latest.html"

          msg = MIMEMultipart("alternative")
          msg["Subject"] = f"📰 Chris's MBA Insider News is ready — {today}"
          msg["From"]    = gmail
          msg["To"]      = gmail

          html_body = f"""
          <html><body style="font-family:Georgia,serif;background:#FAF7F4;padding:32px;">
            <div style="max-width:560px;margin:0 auto;background:#fff;border-radius:12px;
                        box-shadow:0 4px 20px rgba(191,87,0,0.1);overflow:hidden;">
              <div style="background:linear-gradient(135deg,#8B3E00,#BF5700);padding:28px 32px;text-align:center;">
                <div style="font-size:11px;color:rgba(255,255,255,0.6);letter-spacing:0.2em;
                            text-transform:uppercase;margin-bottom:8px;">Weekly Intelligence Brief</div>
                <h1 style="margin:0;font-size:24px;color:#fff;font-weight:900;">
                  Chris's MBA Insider News
                </h1>
                <div style="font-size:12px;color:rgba(255,255,255,0.65);margin-top:8px;">{today}</div>
              </div>
              <div style="padding:28px 32px;text-align:center;">
                <p style="font-size:15px;color:#475569;line-height:1.7;margin:0 0 24px;">
                  Your weekly newsletter covering MBA career coaching, career advising,
                  AI, executive education, networking, and more is ready.
                </p>
                <a href="{url}"
                   style="display:inline-block;background:#BF5700;color:#fff;text-decoration:none;
                          font-size:15px;font-weight:700;padding:14px 32px;border-radius:8px;
                          font-family:Georgia,serif;">
                  📰 Read This Week's Newsletter
                </a>
                <p style="font-size:12px;color:#94a3b8;margin-top:20px;">
                  Or copy this link:<br/>
                  <a href="{url}" style="color:#BF5700;">{url}</a>
                </p>
              </div>
              <div style="background:#FAF7F4;padding:16px 32px;text-align:center;
                          border-top:1px solid #F4C6A0;">
                <p style="font-size:11px;color:#94a3b8;margin:0;">
                  Auto-generated every Monday · Powered by Google News RSS · GitHub Actions
                </p>
              </div>
            </div>
          </body></html>
          """

          msg.attach(MIMEText(html_body, "html"))

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(gmail, app_pw)
              server.sendmail(gmail, gmail, msg.as_string())

          print(f"✅ Email sent to {gmail}")
          EOF
