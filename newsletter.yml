name: Generate MBA Newsletter

on:
  # Run every Monday at 8:00 AM UTC
  schedule:
    - cron: "0 8 * * 1"

  # Run manually anytime from the Actions tab
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # allows committing the HTML file back to the repo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate newsletter
        run: python generate_newsletter.py

      - name: Commit and push newsletter
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsletters/
          git diff --cached --quiet || git commit -m "📰 Weekly MBA newsletter $(date +'%Y-%m-%d')"
          git push
